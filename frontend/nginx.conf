server {
    listen 80;
    server_name _;
    client_max_body_size 50M;

    # Frontend static files
    root /usr/share/nginx/html;
    index index.html;

    # ── Performance: zero-copy + TCP optimization ──
    sendfile        on;
    tcp_nopush      on;   # combine headers + body into fewer packets
    tcp_nodelay     on;   # disable Nagle for small writes (SSE, API)

    # ── Output buffering for large file downloads ──
    output_buffers  4 256k;          # kernel → socket buffer
    postpone_output 0;               # flush immediately, no delay
    aio             threads;         # async I/O for large files (nginx ≥1.7)
    directio        2m;              # bypass page cache for files > 2MB

    # ── Keep-alive tuning ──
    keepalive_timeout  65;
    keepalive_requests 1000;         # reuse connections for multiple requests

    # ── Static asset caching ──
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # File download — buffered for large files (PPT/PDF up to 100MB)
    location /api/files/ {
        proxy_pass http://backend:8000/api/files/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 16 512k;
        proxy_busy_buffers_size 2m;
        proxy_max_temp_file_size 100m;
        proxy_read_timeout 600s;
        send_timeout 600s;
    }

    # Logo download — also buffered
    location /api/logo/download/ {
        proxy_pass http://backend:8000/api/logo/download/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 8 256k;
        proxy_busy_buffers_size 1m;
        proxy_max_temp_file_size 50m;
        proxy_read_timeout 300s;
        send_timeout 300s;
    }

    # API proxy to FastAPI backend (SSE streaming, no buffering)
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # SSE support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        chunked_transfer_encoding on;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
