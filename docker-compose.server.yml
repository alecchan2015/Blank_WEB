version: '3.9'

# Production compose for Tencent Cloud (CentOS 7, Docker 24)
# Port mapping avoids conflicts with existing containers on the host:
#   frontend  → host:8090  (aichat-web occupies :80)
#   backend   → host:8001  (avoids :8000 if anything else uses it)

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: brand-consultant-backend
    container_name: brand_consultant_backend
    restart: always
    environment:
      - DATABASE_URL=sqlite:////app/data/brand_consultant.db
      - SECRET_KEY=${SECRET_KEY:-change_me_in_production_please}
      - UPLOAD_DIR=/app/data/uploads
      - PPT_PROVIDER=${PPT_PROVIDER:-local}
      - PPT_FALLBACK=${PPT_FALLBACK:-local}
      # Mihomo (Clash Meta) proxy on host — enables Gamma API access from CN server
      - HTTP_PROXY=http://172.17.0.1:7890
      - HTTPS_PROXY=http://172.17.0.1:7890
      - NO_PROXY=localhost,127.0.0.1,172.17.0.0/12,192.168.0.0/16
    volumes:
      - ./data:/app/data
    ports:
      - "8001:8000"
    networks:
      - brand_consultant_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: brand-consultant-frontend
    container_name: brand_consultant_frontend
    restart: always
    ports:
      - "9080:80"
    depends_on:
      - backend
    networks:
      - brand_consultant_net

networks:
  brand_consultant_net:
    driver: bridge
